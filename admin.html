<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Invitati — Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <style>
    /* ── ADMIN-SPECIFIC ── */
    body { padding-top: 0; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--ivory) 0%, var(--blush) 100%);
      padding: 2rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-card .script { font-size: 2.5rem; }
    .login-card h2 { margin: 0.5rem 0 2rem; font-size: 1.2rem; color: var(--text); font-weight: 400; }

    .login-card input[type="password"] {
      width: 100%;
      padding: 0.9rem 1.1rem;
      border: 1.5px solid #DDD0C0;
      border-radius: 8px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--dark);
      outline: none;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .login-card input[type="password"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,108,0.15);
    }

    .login-error {
      color: #c62828;
      font-size: 0.88rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* ADMIN LAYOUT */
    .admin-wrap { display: none; min-height: 100vh; background: #F4F0EA; }

    .admin-header {
      background: var(--dark);
      color: var(--white);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .admin-header-left { display: flex; align-items: center; gap: 1rem; }
    .admin-header .script { font-size: 2rem; color: var(--gold); }
    .admin-header h1 { font-size: 1rem; font-weight: 400; color: rgba(255,255,255,0.7); font-family: 'Lato',sans-serif; }

    .btn-sm {
      padding: 0.5rem 1.1rem;
      font-size: 0.75rem;
      border-radius: 50px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn-sm:hover { border-color: var(--gold); color: var(--gold); }
    .btn-sm.danger:hover { border-color: #ef9a9a; color: #ef9a9a; }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: #E0D5C5;
      border-bottom: 1px solid #E0D5C5;
    }

    .stat-box {
      background: var(--white);
      padding: 1.25rem 1.5rem;
      text-align: center;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* MAIN CONTENT */
    .admin-body {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 130px);
    }

    /* ADD FORM SIDEBAR */
    .add-panel {
      background: var(--white);
      padding: 2rem 1.75rem;
      border-right: 1px solid #E0D5C5;
      overflow-y: auto;
    }

    .add-panel h2 {
      font-size: 1.1rem;
      color: var(--dark);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--blush);
    }

    .add-panel .form-group { margin-bottom: 1rem; }

    .add-panel label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 0.35rem;
    }

    .add-panel input,
    .add-panel select,
    .add-panel textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #DDD0C0;
      border-radius: 7px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--dark);
      outline: none;
      transition: all 0.2s ease;
    }

    .add-panel input:focus,
    .add-panel select:focus,
    .add-panel textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,108,0.12);
    }

    .add-panel .btn { width: 100%; justify-content: center; margin-top: 0.5rem; }

    /* GUEST LIST */
    .list-panel {
      padding: 1.75rem 2rem;
      overflow-y: auto;
    }

    .list-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .list-toolbar h2 { font-size: 1.1rem; color: var(--dark); }

    .search-input {
      padding: 0.6rem 1rem;
      border: 1.5px solid #DDD0C0;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: var(--dark);
      outline: none;
      width: 220px;
      transition: all 0.2s ease;
    }

    .search-input:focus { border-color: var(--gold); }

    .toolbar-right { display: flex; gap: 0.5rem; align-items: center; }

    /* TABLE */
    .guest-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .guest-table thead {
      background: var(--dark);
      color: var(--white);
    }

    .guest-table th {
      padding: 0.9rem 1rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .guest-table th:hover { color: var(--gold); }
    .guest-table th.sorted { color: var(--gold); }

    .guest-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #F0E8DC;
      font-size: 0.93rem;
      color: var(--dark);
      vertical-align: middle;
    }

    .guest-table tr:last-child td { border-bottom: none; }
    .guest-table tbody tr:hover { background: #FDF8F2; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge-si { background: #e8f5e9; color: #2e7d32; }
    .badge-no { background: #fce4ec; color: #c62828; }

    .del-btn {
      background: none;
      border: 1.5px solid #DDD0C0;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: all 0.2s ease;
      line-height: 1;
    }

    .del-btn:hover { border-color: #ef9a9a; color: #c62828; background: #fce4ec; }

    .edit-btn {
      background: none;
      border: 1.5px solid #DDD0C0;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: all 0.2s ease;
      line-height: 1;
      margin-right: 4px;
    }

    .edit-btn:hover { border-color: var(--gold); color: var(--gold); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 1rem; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: var(--white);
      padding: 0.85rem 1.75rem;
      border-radius: 50px;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* FILTER TABS */
    .filter-tabs { display: flex; gap: 0.5rem; }

    .filter-tab {
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid #DDD0C0;
      background: transparent;
      color: var(--text);
      font-family: 'Lato', sans-serif;
      transition: all 0.2s ease;
    }

    .filter-tab.active, .filter-tab:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--white);
    }

    @media (max-width: 900px) {
      .admin-body { grid-template-columns: 1fr; }
      .add-panel { border-right: none; border-bottom: 1px solid #E0D5C5; }
    }

    @media (max-width: 600px) {
      .list-panel { padding: 1.25rem; }
      .search-input { width: 100%; }
      .list-toolbar { flex-direction: column; align-items: flex-start; }
      .guest-table { font-size: 0.85rem; }
      .guest-table th, .guest-table td { padding: 0.65rem 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div class="login-wrap" id="loginView">
    <div class="login-card">
      <span class="script">G &amp; S</span>
      <h2>Area riservata — Lista Invitati</h2>
      <form id="loginForm">
        <input type="password" id="pwdInput" placeholder="Password" autocomplete="current-password">
        <p class="login-error" id="loginError">Password errata. Riprova.</p>
        <button type="submit" class="btn" style="width:100%;">Accedi</button>
      </form>
    </div>
  </div>

  <!-- ── ADMIN ── -->
  <div class="admin-wrap" id="adminView">

    <!-- HEADER -->
    <div class="admin-header">
      <div class="admin-header-left">
        <span class="script">G &amp; S</span>
        <h1>Lista Invitati · 10 Dicembre 2026</h1>
      </div>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="btn-sm" onclick="exportCSV()">⬇ Esporta CSV</button>
        <button class="btn-sm" onclick="exportText()">📋 Copia Lista</button>
        <button class="btn-sm danger" onclick="logout()">Esci</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-num" id="statTotale">0</div>
        <div class="stat-label">Risposte totali</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statPresenti" style="color:#2e7d32;">0</div>
        <div class="stat-label">Presenti (famiglie/coppie)</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statPersone">0</div>
        <div class="stat-label">Totale persone</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statAssenti" style="color:#c62828;">0</div>
        <div class="stat-label">Non presenti</div>
      </div>
    </div>

    <!-- BODY -->
    <div class="admin-body">

      <!-- ADD PANEL -->
      <div class="add-panel">
        <h2>➕ Aggiungi Invitato</h2>
        <form id="addForm">
          <div class="form-group">
            <label for="addNome">Nome *</label>
            <input type="text" id="addNome" placeholder="es. Marco" required>
          </div>
          <div class="form-group">
            <label for="addCognome">Cognome *</label>
            <input type="text" id="addCognome" placeholder="es. Rossi" required>
          </div>
          <div class="form-group">
            <label for="addPartecipa">Partecipa?</label>
            <select id="addPartecipa">
              <option value="si">✅ Sì</option>
              <option value="no">❌ No</option>
              <option value="da_confermare">⏳ Da confermare</option>
            </select>
          </div>
          <div class="form-group" id="numGroup">
            <label for="addNumero">N° persone (incluso ospite)</label>
            <input type="number" id="addNumero" min="1" max="20" value="1">
          </div>
          <div class="form-group">
            <label for="addNote">Note</label>
            <textarea id="addNote" rows="2" placeholder="intolleranze, bambini…"></textarea>
          </div>
          <button type="submit" class="btn">Aggiungi</button>
        </form>
      </div>

      <!-- LIST PANEL -->
      <div class="list-panel">
        <div class="list-toolbar">
          <div>
            <h2>Elenco Invitati</h2>
          </div>
          <div class="toolbar-right">
            <div class="filter-tabs">
              <button class="filter-tab active" onclick="setFilter('tutti', this)">Tutti</button>
              <button class="filter-tab" onclick="setFilter('si', this)">Presenti</button>
              <button class="filter-tab" onclick="setFilter('no', this)">Assenti</button>
              <button class="filter-tab" onclick="setFilter('da_confermare', this)">Da confermare</button>
            </div>
          </div>
        </div>
        <div style="margin-bottom:1rem;">
          <input type="text" class="search-input" id="searchInput" placeholder="🔍  Cerca per nome…" oninput="renderGuests()">
        </div>
        <div id="guestListContainer"></div>
      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── CONFIG ── */
    const API_URL = 'https://script.google.com/macros/s/AKfycbyKPuBdBA7yeTCEZ42fso6pD9Qnrz-Rz6SqIp4lMPEj3GdP5uisQNiwBfmnWDuErBF6vA/exec';

    let currentFilter = 'tutti';
    let sortField     = 'cognome';
    let sortDir       = 1;
    let cachedGuests  = [];

    /* ── AUTH ── */
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pwd = document.getElementById('pwdInput').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Verifica…';
      try {
        const result = await api({ action: 'verifyPassword', pwd });
        if (result.ok) {
          sessionStorage.setItem('admin_ok', '1');
          showAdmin();
        } else {
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('pwdInput').value = '';
          document.getElementById('pwdInput').focus();
        }
      } catch(err) {
        document.getElementById('loginError').style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Accedi';
      }
    });

    function logout() {
      sessionStorage.removeItem('admin_ok');
      location.reload();
    }

    if (sessionStorage.getItem('admin_ok') === '1') showAdmin();

    function showAdmin() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
      loadGuests();
    }

    /* ── API ── */
    async function api(params) {
      const url = new URL(API_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString());
      return res.json();
    }

    async function loadGuests() {
      document.getElementById('guestListContainer').innerHTML =
        '<div class="empty-state"><div class="icon">⏳</div><p>Caricamento…</p></div>';
      try {
        cachedGuests = await api({ action: 'list' });
      } catch(err) {
        showToast('Errore connessione al server');
        cachedGuests = [];
      }
      renderGuests();
    }

    /* ── ADD FORM ── */
    document.getElementById('addPartecipa').addEventListener('change', function () {
      document.getElementById('numGroup').style.display = this.value === 'si' ? 'block' : 'none';
    });

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();
      const partecipa = document.getElementById('addPartecipa').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Salvataggio…';
      try {
        await api({
          action:   'add',
          nome:     document.getElementById('addNome').value.trim(),
          cognome:  document.getElementById('addCognome').value.trim(),
          partecipa,
          numero:   partecipa === 'si' ? (document.getElementById('addNumero').value || 1) : 0,
          note:     document.getElementById('addNote').value.trim()
        });
        await loadGuests();
        e.target.reset();
        document.getElementById('addNumero').value = 1;
        document.getElementById('numGroup').style.display = 'block';
        document.getElementById('addNome').focus();
        showToast('Invitato aggiunto ✓');
      } catch(err) {
        showToast('Errore connessione');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Aggiungi';
      }
    });

    /* ── DELETE ── */
    async function deleteGuest(id) {
      if (!confirm('Rimuovere questo invitato?')) return;
      try {
        await api({ action: 'delete', id });
        await loadGuests();
        showToast('Invitato rimosso');
      } catch(err) {
        showToast('Errore connessione');
      }
    }

    /* ── TOGGLE PARTECIPA ── */
    async function cyclePartecipa(id) {
      const g = cachedGuests.find(g => String(g.id) === String(id));
      if (!g) return;
      const cycle = { si: 'no', no: 'da_confermare', da_confermare: 'si' };
      const newPartecipa = cycle[g.partecipa] || 'si';
      try {
        await api({ action: 'toggle', id, partecipa: newPartecipa });
        await loadGuests();
      } catch(err) {
        showToast('Errore connessione');
      }
    }

    /* ── DATE FORMAT ── */
    function formatDate(d) {
      if (!d) return '—';
      const date = new Date(d);
      if (isNaN(date.getTime())) return d;
      return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
    }

    /* ── FILTER ── */
    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGuests();
    }

    /* ── SORT ── */
    function sortBy(field) {
      if (sortField === field) sortDir *= -1;
      else { sortField = field; sortDir = 1; }
      document.querySelectorAll('.guest-table th').forEach(th => th.classList.remove('sorted'));
      const th = document.querySelector(`[data-sort="${field}"]`);
      if (th) th.classList.add('sorted');
      renderGuests();
    }

    /* ── RENDER ── */
    function renderGuests() {
      const all     = cachedGuests;
      const search  = (document.getElementById('searchInput')?.value || '').toLowerCase();
      const presenti = all.filter(g => g.partecipa === 'si');
      const assenti  = all.filter(g => g.partecipa === 'no');

      document.getElementById('statTotale').textContent   = all.length;
      document.getElementById('statPresenti').textContent = presenti.length;
      document.getElementById('statPersone').textContent  = presenti.reduce((s, g) => s + (Number(g.numero) || 0), 0);
      document.getElementById('statAssenti').textContent  = assenti.length;

      let list = all.filter(g => {
        const matchFilter = currentFilter === 'tutti' || g.partecipa === currentFilter;
        const matchSearch = !search ||
          (g.nome || '').toLowerCase().includes(search) ||
          (g.cognome || '').toLowerCase().includes(search);
        return matchFilter && matchSearch;
      });

      list.sort((a, b) => {
        let va = a[sortField] || '', vb = b[sortField] || '';
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        return va < vb ? -sortDir : va > vb ? sortDir : 0;
      });

      const container = document.getElementById('guestListContainer');

      if (list.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>${all.length === 0 ? 'Nessun invitato ancora. Aggiungi il primo!' : 'Nessun risultato per questa ricerca.'}</p>
          </div>`;
        return;
      }

      const badgeMap = {
        si:            '<span class="badge badge-si">✅ Sì</span>',
        no:            '<span class="badge badge-no">❌ No</span>',
        da_confermare: '<span class="badge" style="background:#fff8e1;color:#b7791f;">⏳ Da conf.</span>'
      };

      const rows = list.map(g => `
        <tr>
          <td><strong>${g.cognome}</strong></td>
          <td>${g.nome}</td>
          <td>
            <button onclick="cyclePartecipa('${g.id}')" title="Clicca per cambiare stato" style="background:none;border:none;cursor:pointer;padding:0;">
              ${badgeMap[g.partecipa] || ''}
            </button>
          </td>
          <td style="text-align:center;">${g.partecipa === 'si' ? g.numero : '—'}</td>
          <td style="color:var(--text); font-size:0.85rem;">${g.note || '—'}</td>
          <td style="color:var(--text); font-size:0.82rem; white-space:nowrap;">${formatDate(g.aggiunto)}</td>
          <td>
            <button class="del-btn" onclick="deleteGuest('${g.id}')" title="Elimina">🗑</button>
          </td>
        </tr>`).join('');

      container.innerHTML = `
        <table class="guest-table">
          <thead>
            <tr>
              <th data-sort="cognome" onclick="sortBy('cognome')">Cognome ↕</th>
              <th data-sort="nome" onclick="sortBy('nome')">Nome ↕</th>
              <th data-sort="partecipa" onclick="sortBy('partecipa')">Partecipa ↕</th>
              <th style="text-align:center;">Persone</th>
              <th>Note</th>
              <th data-sort="aggiunto" onclick="sortBy('aggiunto')">Aggiunto ↕</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    /* ── EXPORT ── */
    function exportCSV() {
      if (!cachedGuests.length) { showToast('Nessun dato da esportare'); return; }
      const header = 'Cognome,Nome,Partecipa,N° Persone,Note,Aggiunto';
      const rows = cachedGuests.map(g =>
        `"${g.cognome}","${g.nome}","${g.partecipa}","${g.partecipa === 'si' ? g.numero : 0}","${(g.note||'').replace(/"/g,'""')}","${g.aggiunto}"`
      );
      const csv  = [header, ...rows].join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'invitati_gs2026.csv' });
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV scaricato ✓');
    }

    function exportText() {
      const presenti = cachedGuests.filter(g => g.partecipa === 'si');
      if (!presenti.length) { showToast('Nessun invitato confermato'); return; }
      const totalPersone = presenti.reduce((s, g) => s + (Number(g.numero) || 0), 0);
      const lines = [
        `MATRIMONIO GIANLUCA & SARA — 10 Dicembre 2026`,
        `Lista invitati confermati (${new Date().toLocaleDateString('it-IT')})`,
        `─────────────────────────────────────────`,
        ...presenti.map((g, i) => `${i+1}. ${g.cognome} ${g.nome}${g.numero > 1 ? ` (+${Number(g.numero)-1})` : ''}${g.note ? ' — ' + g.note : ''}`),
        `─────────────────────────────────────────`,
        `Totale: ${presenti.length} risposte · ${totalPersone} persone`
      ].join('\n');
      navigator.clipboard.writeText(lines)
        .then(() => showToast('Lista copiata negli appunti ✓'))
        .catch(() => showToast('Errore copia — prova da browser diverso'));
    }

    /* ── TOAST ── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>
