<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F5FF"/>
      <stop offset="55%" style="stop-color:#DDE9F8"/>
      <stop offset="100%" style="stop-color:#B8CDE8"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Playfair+Display:ital@0;1&amp;family=Lato:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Sfondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern puntini -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(37,99,168,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Cornice elegante -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#2563A8" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="52" y="52" width="1096" height="526" fill="none" stroke="#2563A8" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Ornamenti angoli -->
  <text x="58" y="82" font-family="serif" font-size="28" fill="#2563A8" fill-opacity="0.3">✦</text>
  <text x="1118" y="82" font-family="serif" font-size="28" fill="#2563A8" fill-opacity="0.3">✦</text>
  <text x="58" y="598" font-family="serif" font-size="28" fill="#2563A8" fill-opacity="0.3">✦</text>
  <text x="1118" y="598" font-family="serif" font-size="28" fill="#2563A8" fill-opacity="0.3">✦</text>

  <!-- Testo superiore -->
  <text x="600" y="170" font-family="'Lato', sans-serif" font-size="16" font-weight="300" fill="#4E7AB5" letter-spacing="6" text-anchor="middle" text-transform="uppercase">SIAMO LIETI DI ANNUNCIARE</text>

  <!-- Nome principale -->
  <text x="600" y="310" font-family="'Great Vibes', cursive, Georgia, serif" font-size="130" fill="#2563A8" text-anchor="middle">Gianluca &amp; Sara</text>

  <!-- Divisore -->
  <line x1="380" y1="345" x2="540" y2="345" stroke="#2563A8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="352" font-family="serif" font-size="16" fill="#2563A8" text-anchor="middle">✦</text>
  <line x1="660" y1="345" x2="820" y2="345" stroke="#2563A8" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Data -->
  <text x="600" y="415" font-family="'Playfair Display', Georgia, serif" font-size="36" fill="#0F2444" text-anchor="middle">10 Dicembre 2026</text>

  <!-- Luogo -->
  <text x="600" y="465" font-family="'Lato', sans-serif" font-size="18" font-weight="300" fill="#2C4A70" text-anchor="middle" letter-spacing="1">Chiesa di San Riccardo Pampuri · Peschiera Borromeo</text>

  <!-- Ornamento inferiore -->
  <text x="600" y="535" font-family="serif" font-size="14" fill="#B8CDE8" text-anchor="middle" letter-spacing="14">✦ ✦ ✦</text>
</svg>
